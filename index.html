    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0a0806;
            --dark-surface: #1a1612;
            --pure-white: #ffffff;
            --off-white: #fef8f0;
            --gold: #D4AF37;
            --dark-gold: #B8960C;
            --light-gold: #f5e2a1;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.3);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.4);
            --border-radius-card: 24px;
            --transition: all 0.3s ease;
        }

        body {
            background: var(--dark-bg);
            font-family: 'Inter', 'Poppins', sans-serif;
            color: #e8e2d4;
            scroll-behavior: smooth;
        }

        .gold-divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--light-gold));
            margin: 12px auto 20px;
            border-radius: 3px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            position: relative;
            display: inline-block;
        }
        .section-title span {
            color: var(--light-gold);
        }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, rgba(10,8,6,0.95), rgba(26,22,18,0.98)), url('https://images.pexels.com/photos/67468/indian-food-platter-thali-served-67468.jpeg?auto=compress&cs=tinysrgb&w=1600') no-repeat center center/cover;
            background-blend-mode: overlay;
            padding: 2.5rem 1.5rem 3rem;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }
        .rudra-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .rudra-logo h1:last-child {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #c9a03d, var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
        }
        .tagline {
            font-size: 1.2rem;
            color: var(--light-gold);
            margin: 12px 0;
            font-weight: 500;
        }
        .tagline marathi-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gold);
        }
        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 28px 0 20px;
            flex-wrap: wrap;
        }
        .btn-wa, .btn-call {
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .btn-wa {
            background: #25D366;
            color: white;
        }
        .btn-call {
            background: var(--gold);
            color: #1a1a1a;
        }
        .btn-wa:hover, .btn-call:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        /* Sticky Category Nav */
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,8,6,0.98);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
        }
        .categories-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            scrollbar-width: thin;
            padding-bottom: 6px;
        }
        .categories-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .categories-scroll::-webkit-scrollbar-track {
            background: #2a251f;
            border-radius: 10px;
        }
        .categories-scroll::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        .cat-btn {
            background: transparent;
            border: 1px solid rgba(212,175,55,0.4);
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            color: #e8e2d4;
            transition: var(--transition);
            cursor: pointer;
        }
        .cat-btn i {
            margin-right: 6px;
            color: var(--gold);
        }
        .cat-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #0a0806;
        }
        .cat-btn.active i {
            color: #0a0806;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 30px 20px 50px;
        }
        .menu-section {
            margin-bottom: 55px;
            scroll-margin-top: 90px;
        }
        .menu-section h2 {
            font-size: 2rem;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            border-left: 5px solid var(--gold);
            padding-left: 20px;
            margin-bottom: 28px;
            color: var(--gold);
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .menu-card {
            background: var(--pure-white);
            border-radius: var(--border-radius-card);
            padding: 0;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid rgba(212,175,55,0.2);
        }
        .menu-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
            border-color: rgba(212,175,55,0.6);
        }
        .menu-img {
            width: 400px;
            height: 400px;
            object-fit: cover;
            background: #f5f0e6;
            border-bottom: 2px solid var(--gold);
        }
        .card-content {
            padding: 16px 18px 20px;
            background: var(--pure-white);
        }
        .dish-name {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .dish-name span:first-child {
            font-family: 'Playfair Display', serif;
            color: #2c2418;
        }
        .dish-desc {
            font-size: 0.8rem;
            color: #6b6256;
            margin-top: 5px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .veg-badge {
            font-size: 0.7rem;
            background: #e8f5e9;
            padding: 2px 10px;
            border-radius: 20px;
            color: #2e7d32;
            font-weight: 500;
        }

        /* Gallery & Reviews */
        .gallery-section, .reviews-section, .inquiry-section {
            margin: 60px 0 40px;
        }
        .gallery-grid {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 8px 4px 20px;
        }
        .gallery-grid img {
            width: 220px;
            height: 160px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            border: 2px solid rgba(212,175,55,0.4);
            transition: 0.2s;
        }
        .gallery-grid img:hover {
            border-color: var(--gold);
            transform: scale(1.02);
        }
        .review-card {
            background: var(--dark-surface);
            padding: 20px;
            border-radius: 28px;
            box-shadow: var(--shadow-sm);
            border-left: 5px solid var(--gold);
            min-width: 260px;
            color: #e8e2d4;
        }
        .review-card p {
            margin: 10px 0;
            color: #d4cfc5;
        }
        .review-card i.fa-star {
            color: var(--gold);
        }
        .inquiry-form input, .inquiry-form textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 30px;
            border: 1px solid rgba(212,175,55,0.3);
            background: var(--dark-surface);
            color: #e8e2d4;
            font-size: 1rem;
        }
        .inquiry-form input::placeholder, .inquiry-form textarea::placeholder {
            color: #9a9284;
        }
        .inquiry-form input:focus, .inquiry-form textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(212,175,55,0.2);
        }
        .inquiry-form button {
            background: var(--gold);
            color: #0a0806;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .inquiry-form button:hover {
            background: #c9a03d;
            transform: scale(1.02);
        }
        footer {
            background: #050403;
            color: #b8aa8c;
            padding: 32px 20px;
            text-align: center;
            margin-top: 40px;
            border-top: 1px solid rgba(212,175,55,0.3);
        }
        .floating-wa {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: #25D366;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            z-index: 99;
            transition: 0.2s;
        }
        .floating-wa:hover {
            transform: scale(1.08);
        }
        .floating-wa a {
            color: white;
            font-size: 28px;
        }
        @media (max-width: 640px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .hero .rudra-logo h1 {
                font-size: 2.2rem;
            }
            .menu-img {

            }

    </style>

    const categories = Object.keys(menuData);
    const tabsContainer = document.getElementById("categoryTabs");
    const menuContainerDiv = document.getElementById("menuContainer");

    function renderCategoryButtons() {
        tabsContainer.innerHTML = '';
        categories.forEach((cat, idx) => {
            const btn = document.createElement('button');
            btn.className = `cat-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerHTML = `<i class="fas fa-utensils"></i> ${cat}`;
            btn.setAttribute('data-cat', cat);
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const target = document.getElementById(`section-${cat}`);
                if(target) target.scrollIntoView({ behavior: "smooth", block: "start" });
            });
            tabsContainer.appendChild(btn);
        });
    }

    function buildFullMenu() {
        let html = '';
        for(let cat of categories) {
            const items = menuData[cat];
            html += `<div class="menu-section" id="section-${cat}">`;
            html += `<h2><i class="fas fa-crown" style="color:var(--gold); margin-right:12px;"></i> ${cat}</h2>`;
            html += `<div class="menu-grid">`;
            items.forEach(item => {
                html += `
                    <div class="menu-card">
                        <img class="menu-img" src="${item.img}" alt="${item.name}" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%25%22 height=%22100%25%22 viewBox=%220 0 200 200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23f3e5cd%22/%3E%3Ctext x=%22100%22 y=%22120%22 font-size=%2280%22 text-anchor=%22middle%22 fill=%22%23b8860b%22%3E🍽️%3C/text%3E%3C/svg%3E';">
                        <div class="card-content">
                            <div class="dish-name">
                                <span>${item.name}</span>
                            </div>
                            <div class="dish-desc">
                                <span>${item.desc}</span>
                                <span class="veg-badge">${item.type}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
        }
        menuContainerDiv.innerHTML = html;
    }

    document.getElementById("sendInquiry")?.addEventListener("click", () => {
        const name = document.getElementById("inqName").value;
        const mobile = document.getElementById("inqMobile").value;
        const msg = document.getElementById("inqMsg").value;
        if(!name || !mobile) {
            alert("कृपया नाव आणि मोबाईल नंबर भरा");
            return;
        }
        const text = `नमस्कार Rudra Catering,\nबुकिंग/इन्क्वायरी:\nनाव: ${name}\nमोबाईल: ${mobile}\nसंदेश: ${msg}`;
        window.open(`https://wa.me/919699104602?text=${encodeURIComponent(text)}`, "_blank");
    });

    renderCategoryButtons();
    buildFullMenu();

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                const activeSection = entry.target.id.replace('section-', '');
                document.querySelectorAll('.cat-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-cat') === activeSection);
                });
            }
        });
    }, { threshold: 0.4, rootMargin: "-70px 0px -30px 0px" });

    setTimeout(() => {
        document.querySelectorAll('.menu-section').forEach(section => observer.observe(section));
    }, 200);
</script>
